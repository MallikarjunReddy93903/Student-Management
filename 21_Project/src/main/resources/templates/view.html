<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Employee List</title>
    <style>
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 8px 12px;
            border: 1px solid #ccc;
            text-align: left;
        }
        th {
            background-color: #f2f2f2;
        }
    </style>
</head>
<body>

<h2>Employee List</h2>
<a th:href="@{/signup}" class="btn btn-add">Add New Employee</a>
<table>
    <thead>
        <tr>
            <th>employeeId</th>
            <th>employeeName</th>
            <th>employeeEmail</th>
            <th>employeePhoneNo</th>
            <th>employeeDepartment</th>
            <th>employeeSalary</th>
            <th>employeeCity</th>
        </tr>
    </thead>
    <tbody>
        <!-- Loop through employees -->
        <tr th:each="employee : ${employees}">
            <td th:text="${employee.employeeId}"></td>
            <td th:text="${employee.employeeName}"></td>
            <td th:text="${employee.employeeEmail}"></td>
            <td th:text="${employee.employeePhoneNo}"></td>
            <td th:text="${employee.employeeDepartment}"></td>
            <td th:text="${employee.employeeSalary}"></td>
            <td th:text="${employee.employeeCity}"></td>
			<td>
				
				     <a th:href="@{/edit/{id}(id=${employee.employeeId})}"
					  class="btn btn-edit">Edit</a>
				    
					 <a th:href="@{/delete/{id}(id=${employee.employeeId})}"
					 				    class="btn btn-delete"
					 				    onclick="return confirm('Are you sure you want to delete this student?');">
					 				    Delete
					 				 </a>
				 </td> 
						   
								   
        </tr>
    </tbody>
</table>

</body>
</html>
